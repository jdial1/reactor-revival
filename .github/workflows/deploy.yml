name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      # public/src is the single source of truth; no copy step needed

      - name: Generate version.json, splash counts, and changelog
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_HEAD_COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          CHANGELOG_COMMIT_MESSAGES: ${{ toJson(github.event.commits.*.message) }}
        run: npm run generate-metadata

      - name: Commit deploy changelog
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/changelog.json
          if git diff --staged --quiet; then
            echo "changelog.json unchanged"
          else
            git commit -m "chore: update deploy changelog [skip ci]"
            git push
          fi

      - name: Copy external libraries
        run: npm run copy-libs

      - name: Fix manifest.json for GitHub Pages
        run: node scripts/qa/pwa-check.js --fix-manifest

      - name: Run test suite
        run: npm test

      - name: Bundle CSS for production
        run: npm run build:css

      - name: Build Service Worker
        run: npm run build:sw

      - name: Check PWA root files
        run: npm run check-pwa-root-files

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  post-deploy-check:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Wait for deployment to be ready
        run: sleep 60

      - name: Run PWA post-deployment checks
        id: pwa-check
        env:
          GITHUB_PAGES_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          echo "Running PWA checks for: ${{ needs.deploy.outputs.page_url }}"
          node scripts/qa/pwa-check.js --remote

      - name: Run UI console audit
        env:
          BASE_URL: ${{ needs.deploy.outputs.page_url }}
          AUDIT_FAIL_ON: pageerror,critical.startup
        run: |
          echo "Running UI console audit for: $BASE_URL"
          npm run ui:console-audit:deploy

      - name: Run UI screenshots
        env:
          BASE_URL: ${{ needs.deploy.outputs.page_url }}
          SCREENSHOT_LAYOUT_AUDIT: "1"
        run: |
          echo "Running UI screenshots for: $BASE_URL"
          npm run ui:screenshots:deploy

      - name: Create check status comment (on failure)
        if: failure()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            try {
              const { owner, repo } = context.repo;
              const sha = context.sha;

              await github.rest.repos.createCommitComment({
                owner,
                repo,
                commit_sha: sha,
                body: '❌ Post-deployment checks failed (PWA, UI console audit, and/or UI screenshots). Critical startup errors, page errors, or other check failures — see workflow logs.'
              });
              console.log('✅ Failure comment created successfully');
            } catch (error) {
              console.log('⚠️ Could not create commit comment (insufficient permissions):', error.message);
              console.log('📝 Post-deployment checks failed - see workflow logs for details');
            }

      - name: Create check status comment (on success)
        if: success()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            try {
              const { owner, repo } = context.repo;
              const sha = context.sha;

              await github.rest.repos.createCommitComment({
                owner,
                repo,
                commit_sha: sha,
                body: '✅ Deployment successful! PWA checks, UI console audit, and UI screenshots passed (no critical startup or page errors).'
              });
              console.log('✅ Success comment created successfully');
            } catch (error) {
              console.log('⚠️ Could not create commit comment (insufficient permissions):', error.message);
              console.log('📝 Deployment successful - all post-deployment checks passed');
            }
