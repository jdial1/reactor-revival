name: E2E Soak S1-S9

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  soak:
    name: Playwright S1-S9
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run soak S1-S9
        env:
          CI: "true"
        run: npm run test:e2e:soak
