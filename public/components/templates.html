<!-- Legacy templates still used by part.js, upgrade.js, tooltip.js, gameSetupFlow.js. Migrating to lit-html. -->
<template id="part-btn-template">
  <button class="part pixel-btn is-square" title="">
    <div class="image"></div>
    <div class="part-price"></div>
    <div class="tier-progress" style="display: none;"></div>
    <div class="part-details">
      <div class="part-details-title"></div>
      <div class="part-details-stats"></div>
      <div class="part-details-desc"></div>
      <div class="part-details-bonuses"></div>
    </div>
  </button>
</template>
<template id="upgrade-card-template">
  <div class="upgrade-card" data-id="">
    <div class="upgrade-header">
      <div class="upgrade-icon-wrapper">
        <div class="image"></div>
      </div>
      <div class="upgrade-details">
        <div class="upgrade-title"></div>
        <div class="upgrade-description"></div>
      </div>
      <div class="upgrade-doctrine-icon"></div>
    </div>
    <div class="upgrade-footer">
      <div class="upgrade-level-info">
        <span class="level-text"></span>
      </div>
      <button class="pixel-btn upgrade-action-btn">
        <span class="action-text">Buy</span>
        <span class="cost-display"></span>
      </button>
      <div class="sandbox-upgrade-actions">
        <button class="pixel-btn sandbox-buy-max-btn" type="button">Buy Max</button>
        <button class="pixel-btn sandbox-reset-btn" type="button">Reset</button>
      </div>
    </div>
  </div>
</template>
<template id="tooltip-body-template">
  <div
    data-role="title"
    class="tooltip-title"
    style=" margin-bottom: 0.5em;font-size: 1.1em; font-weight: bold;"
  ></div>
  <div data-role="desktop-summary" class="tooltip-summary-row"></div>
  <p data-role="description"></p>
  <dl class="tooltip-stats" data-role="desktop-stats"></dl>
  <footer id="tooltip_actions"></footer>
</template>
<template id="game-setup-template">
  <div class="bios-screen game-setup-selection">
    <h1 class="game-setup-header">NEW GAME</h1>
    <div class="bios-content">
      <section class="setup-section setup-doctrine">
        <div class="bios-title-vfd"><h2 class="bios-title">[ SELECT DOCTRINE ]</h2></div>
        <div class="doctrine-cards" role="listbox" aria-label="Select doctrine"></div>
      </section>
      <section class="setup-section setup-difficulty">
        <div class="bios-title-vfd"><h2 class="bios-title">[ SELECT DIFFICULTY ]</h2></div>
        <div class="difficulty-cards" role="radiogroup" aria-label="Select difficulty">
          <button type="button" class="difficulty-card" data-difficulty="easy">
            <img class="difficulty-indicator" src="img/ui/icons/easy.png" alt="">
            <div class="difficulty-card-info">
              <span class="difficulty-name">EASY</span>
              <span class="difficulty-desc">Forgiving heat margins</span>
            </div>
          </button>
          <button type="button" class="difficulty-card" data-difficulty="medium">
            <img class="difficulty-indicator" src="img/ui/icons/medium.png" alt="">
            <div class="difficulty-card-info">
              <span class="difficulty-name">MEDIUM</span>
              <span class="difficulty-desc">Balanced challenge</span>
            </div>
          </button>
          <button type="button" class="difficulty-card" data-difficulty="hard">
            <img class="difficulty-indicator" src="img/ui/icons/hard.png" alt="">
            <div class="difficulty-card-info">
              <span class="difficulty-name">HARD</span>
              <span class="difficulty-desc">Tight margins, fast ticks</span>
            </div>
          </button>
        </div>
      </section>
    </div>
    <footer class="bios-footer">
      <button type="button" class="bios-btn setup-back-btn">[ BACK ]</button>
      <button type="button" class="bios-btn setup-start-btn" disabled>[ START ]</button>
    </footer>
  </div>
</template>
