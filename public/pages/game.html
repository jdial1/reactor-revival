<!-- TOP NAVIGATION -->
<nav id="main_top_nav" class="nav-bar-row">
  <!-- Left Group: Navigation Links -->
  <ul class="nav-group-left">
    <li>
      <button data-page="reactor_section" class="active">Reactor</button>
    </li>
    <li>
      <button data-page="upgrades_section">Upgrades</button>
      <!-- Indicator dot injected via JS -->
    </li>
    <li>
      <button data-page="experimental_upgrades_section">Research</button>
    </li>
    <li>
      <button data-page="leaderboard_section" title="Leaderboard" aria-label="Leaderboard">🏆</button>
    </li>
  </ul>

  <!-- Center Group: Stats (Desktop) -->
  <ul id="reactor_stats" class="desktop-only"></ul>

  <ul id="engine_status" class="desktop-only">
     <li>
        <strong title="Tick Rate">
            <img src="img/ui/icons/icon_time.png" alt="TPS" class="icon-inline" />
            <span id="tps_display">0</span>
        </strong>
     </li>
     <li id="engine_status_indicator_root"></li>
  </ul>

  <!-- Right Group: System Controls -->
  <ul class="nav-group-right">
    <li>
      <button id="user_account_btn" title="Account" aria-label="User Account">👤</button>
    </li>
    <li>
      <button id="fullscreen_toggle" title="Toggle Fullscreen" aria-label="Toggle Fullscreen">⛶</button>
    </li>
    <li>
      <button id="settings_btn" title="Settings" aria-label="Settings">⚙️</button>
    </li>
    <li>
      <button id="splash_close_btn" title="Exit to Title" aria-label="Exit to Title">✖</button>
    </li>
  </ul>
</nav>

<div id="mobile_passive_top_bar" class="mobile-passive-top-bar" aria-hidden="true">
  <div id="mobile_passive_root"></div>
</div>

<!-- MAIN CONTENT -->
<main id="main">
  <!-- PARTS SIDEBAR / BOTTOM SHEET -->
  <aside id="parts_section" class="collapsed">
    <div class="parts_sheet_handle" id="parts_sheet_handle"></div>
    <div class="parts_header">
      <div class="parts_tabs parts_categories_carousel">
        <button
          class="parts_tab active"
          id="tab_power"
          data-tab="power"
          title="Power Creation"
          aria-label="Power Creation"
        >
          <img src="img/ui/icons/icon_power.png" alt="Power" />
          <span class="parts_tab_label">Power</span>
        </button>
        <button
          class="parts_tab"
          id="tab_heat"
          data-tab="heat"
          title="Heat Management"
          aria-label="Heat Management"
        >
          <img src="img/ui/icons/icon_heat.png" alt="Heat" />
          <span class="parts_tab_label">Heat</span>
        </button>
        <button
          id="parts_help_toggle"
          class="parts_help_btn"
          title="Toggle help mode - click to show part information instead of placing parts"
          aria-label="Toggle help mode"
        >
          ?
        </button>
      </div>
    </div>
    <div id="parts_tab_contents"></div>
    <nav id="controls_nav">
      <div id="controls_nav_root"></div>
    </nav>
    <button id="parts_close_btn" class="pixel-btn contrast parts-close-btn" type="button">Close</button>
  </aside>

      <div id="main_content_wrapper">
      <!-- Only show objectives on reactor page -->

      <div id="objectives_toast_root"></div>

    <!-- End reactor-only objectives -->

    <div id="page_content_area">
      <!-- Content will be loaded dynamically -->
    </div>

    <!-- TOOLTIP -->
    <div id="tooltip" class="hidden">
      <div id="tooltip_data">
        <!-- Content injected by TooltipManager -->
      </div>
      <button id="tooltip_close_btn" title="Close" aria-label="Close tooltip">×</button>
    </div>

  </div>
</main>

<!-- Modal for Copy/Paste Data -->
<div id="reactor_copy_paste_modal" class="hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="reactor_copy_paste_modal_title">Reactor Layout</h3>
      <button id="reactor_copy_paste_close_btn" title="Close" aria-label="Close Modal">×</button>
    </div>
    <textarea id="reactor_copy_paste_text" style="width: 100%;min-height: 80px;" placeholder="Paste reactor layout data here..."></textarea>
    <div id="reactor_copy_paste_preview_wrap" class="hidden">
      <div id="reactor_copy_paste_preview_label">Preview</div>
      <canvas id="reactor_copy_paste_preview"></canvas>
    </div>
    <div id="reactor_copy_paste_cost"></div>
    <div class="modal-actions">
      <button id="reactor_copy_paste_confirm_btn" class="hidden">Action</button>
      <button id="reactor_copy_paste_partial_btn" class="hidden">Paste what I can afford</button>
    </div>
  </div>
</div>
<!-- End Copy/Paste UI -->

<div id="my_layouts_modal" class="hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>My Layouts</h3>
      <button id="my_layouts_close_btn" title="Close" aria-label="Close">×</button>
    </div>
    <div class="my-layouts-toolbar">
      <button id="my_layouts_save_from_clipboard_btn" class="pixel-btn" type="button">Save from Clipboard</button>
    </div>
    <div id="my_layouts_list"></div>
  </div>
</div>

<div id="layout_view_modal" class="hidden" style="position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; background: rgb(0 0 0 / 90%);">
  <div style="display: flex; overflow: hidden; flex: 1; flex-direction: column;">
    <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 2px solid rgb(68 68 68);">
      <h3 id="layout_view_title" style="margin: 0; color: rgb(255 255 255);">Reactor Layout</h3>
      <button id="layout_view_close_btn" title="Close" style="padding: 5px 15px; border: 1px solid rgb(102 102 102); background: rgb(68 68 68); color: rgb(255 255 255); cursor: pointer; font-size: 20px;">×</button>
    </div>
    <div id="layout_view_container" style="display: flex; overflow: auto; flex: 1; align-items: center; justify-content: center; padding: 20px;">
      <div id="layout_view_grid"></div>
    </div>
    <div id="layout_view_stats" style="display: flex; align-items: center; justify-content: space-around; padding: 15px; border-top: 2px solid rgb(68 68 68); background: rgb(26 26 26); color: rgb(255 255 255); font-size: 18px;">
      <div><strong>Money:</strong> <span id="layout_stats_money">-</span></div>
      <div><strong>EP:</strong> <span id="layout_stats_ep">-</span></div>
      <div><strong>Heat:</strong> <span id="layout_stats_heat">-</span></div>
      <div><strong>Power:</strong> <span id="layout_stats_power">-</span></div>
    </div>
  </div>
</div>

<!-- BUILD ROW (Above Control Deck, Reactor Page Only): 5 quick-select slots + build FAB -->
<div id="build_above_deck_row" class="build-above-deck-row">
  <div class="quick-select-slots" id="quick_select_slots_container" aria-label="Recent parts">
    <div id="quick_select_slots_root"></div>
    <button id="control_deck_build_fab" class="control-deck-fab" type="button" aria-label="Build Parts" title="Build Parts">
      <span class="control-deck-fab-icon" aria-hidden="true">…</span>
    </button>
  </div>
</div>

<footer id="reactor_control_deck" class="reactor-control-deck">
  <div class="control-deck-inner">
    <div id="control_deck_root" class="control-deck-grid"></div>
  </div>
</footer>

<footer id="info_bar" class="info-bar-legacy">
  <div id="info_bar_root"></div>
</footer>
